name: prompt-marketplace

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=http://libsql:8080
    depends_on:
      libsql:
        condition: service_started
    volumes:
      - ./db:/db:ro
    restart: unless-stopped

  libsql:
    image: ghcr.io/turso technology/libsql-server:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/data/promptmk.db
      - DATABASE_URL=file:/data/promptmk.db
    volumes:
      - db_data:/data
    command: ["--enable-http", "--enable-http-cors"]

volumes:
  db_data: