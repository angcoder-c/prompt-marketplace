services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - ./db/data:/var/lib/sqld

  db-init:
    build: .
    depends_on:
      - libsql
    command: node scripts/init-db.mjs

  app:
    build: .
    depends_on:
      - db-init
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: http://libsql:8080